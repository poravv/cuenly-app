            --from-literal=PAGOPAR_PRIVATE_KEY="${{ secrets.PAGOPAR_PRIVATE_KEY }}" \
            --from-literal=PAGOPAR_BASE_URL="${{ secrets.PAGOPAR_BASE_URL }}" \
            --from-literal=GOOGLE_OAUTH_CLIENT_ID="${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}" \
