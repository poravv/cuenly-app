# Deployment de AlertManager para Kubernetes
# Archivo: backend/k8s/alertmanager-deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: cuenly-backend
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      # Init container para procesar el template con sed
      initContainers:
      - name: config-init
        image: busybox:1.36
        command: ['sh', '-c']
        args:
        - |
          cp /tmp/config-template/config.yml /tmp/config-processed/config.yml
          sed -i "s|\${ALERTMANAGER_SMTP_HOST}|$ALERTMANAGER_SMTP_HOST|g" /tmp/config-processed/config.yml
          sed -i "s|\${ALERTMANAGER_SMTP_PORT}|$ALERTMANAGER_SMTP_PORT|g" /tmp/config-processed/config.yml
          sed -i "s|\${ALERTMANAGER_SMTP_USER}|$ALERTMANAGER_SMTP_USER|g" /tmp/config-processed/config.yml
          sed -i "s|\${ALERTMANAGER_SMTP_PASSWORD}|$ALERTMANAGER_SMTP_PASSWORD|g" /tmp/config-processed/config.yml
          echo "✅ Configuración procesada correctamente"; cat /tmp/config-processed/config.yml
        env:
        - name: ALERTMANAGER_SMTP_HOST
          valueFrom:
            secretKeyRef:
              name: alertmanager-secrets
              key: ALERTMANAGER_SMTP_HOST
        - name: ALERTMANAGER_SMTP_PORT
          valueFrom:
            secretKeyRef:
              name: alertmanager-secrets
              key: ALERTMANAGER_SMTP_PORT
        - name: ALERTMANAGER_SMTP_USER
          valueFrom:
            secretKeyRef:
              name: alertmanager-secrets
              key: ALERTMANAGER_SMTP_USER
        - name: ALERTMANAGER_SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: alertmanager-secrets
              key: ALERTMANAGER_SMTP_PASSWORD
        volumeMounts:
        - name: config-template
          mountPath: /tmp/config-template
        - name: config-processed
          mountPath: /tmp/config-processed

      containers:
      - name: alertmanager
        image: prom/alertmanager:v0.26.0
        args:
        - '--config.file=/etc/alertmanager/config.yml'
        - '--storage.path=/alertmanager'
        - '--web.external-url=http://alertmanager:9093'
        ports:
        - containerPort: 9093
        volumeMounts:
        - name: config-processed
          mountPath: /etc/alertmanager
        - name: storage-volume
          mountPath: /alertmanager
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9093
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9093
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: config-template
        configMap:
          name: alertmanager-config
      - name: config-processed
        emptyDir: {}
      - name: storage-volume
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-service
  namespace: cuenly-backend
spec:
  selector:
    app: alertmanager
  ports:
  - port: 9093
    targetPort: 9093
  type: ClusterIP

---
# ConfigMap con la configuración de AlertManager usando variables
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: cuenly-backend
data:
  config.yml: |
    global:
      smtp_smarthost: '${ALERTMANAGER_SMTP_HOST}:${ALERTMANAGER_SMTP_PORT}'
      smtp_from: '${ALERTMANAGER_SMTP_USER}'
      smtp_auth_username: '${ALERTMANAGER_SMTP_USER}'
      smtp_auth_password: '${ALERTMANAGER_SMTP_PASSWORD}'
      smtp_require_tls: true

    templates:
      - '/etc/alertmanager/templates/*.tmpl'

    route:
      group_by: ['alertname', 'severity']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: 'cuenly-team'
      
      routes:
      - match:
          severity: critical
        receiver: 'critical-alerts'
        group_wait: 5s
        repeat_interval: 30m
        
      - match:
          severity: warning
        receiver: 'warning-alerts'
        repeat_interval: 2h
        
      - match:
          category: business
        receiver: 'business-alerts'
        repeat_interval: 4h

    receivers:
    - name: 'cuenly-team'
      email_configs:
      - to: 'andres.vera@mindtechpy.net, andyvercha@gmail.com'
        subject: '[Cuenly] Alerta: {{ .GroupLabels.alertname }}'
        html: |
          <h2>Alerta Cuenly</h2>
          {{ range .Alerts }}
          <p><b>Alerta:</b> {{ .Annotations.summary }}</p>
          <p><b>Descripcion:</b> {{ .Annotations.description }}</p>
          <p><b>Severidad:</b> {{ .Labels.severity }}</p>
          <p><b>Servicio:</b> {{ .Labels.service }}</p>
          <p><b>Tiempo:</b> {{ .StartsAt.Format "2006-01-02 15:04:05" }}</p>
          <hr>
          {{ end }}

    - name: 'critical-alerts'
      email_configs:
      - to: 'andres.vera@mindtechpy.net, andyvercha@gmail.com'
        subject: '🚨 [CRÍTICO] {{ .GroupLabels.alertname }}'
        html: |
          <h2>ALERTA CRITICA EN CUENLY</h2>
          {{ range .Alerts }}
          <p><b>Problema:</b> {{ .Annotations.summary }}</p>
          <p><b>Detalles:</b> {{ .Annotations.description }}</p>
          <p><b>Servicio:</b> {{ .Labels.service }}</p>
          <p><b>Hora:</b> {{ .StartsAt.Format "2006-01-02 15:04:05" }}</p>
          <p><b>Runbook:</b> {{ .Annotations.runbook_url }}</p>
          <hr>
          {{ end }}

    - name: 'warning-alerts'
      email_configs:
      - to: 'andres.vera@mindtechpy.net, andyvercha@gmail.com'
        subject: '⚠️ [WARNING] {{ .GroupLabels.alertname }}'
        html: |
          <h2>⚠️ Alerta Warning en Cuenly</h2>
          {{ range .Alerts }}
          <p><b>Alerta:</b> {{ .Annotations.summary }}</p>
          <p><b>Descripción:</b> {{ .Annotations.description }}</p>
          <p><b>Servicio:</b> {{ .Labels.service }}</p>
          <hr>
          {{ end }}

    - name: 'business-alerts'
      email_configs:
      - to: 'andres.vera@mindtechpy.net, andyvercha@gmail.com'
        subject: '📊 [BUSINESS] {{ .GroupLabels.alertname }}'
        html: |
          <h2>📊 Alerta de Negocio en Cuenly</h2>
          {{ range .Alerts }}
          <p><b>Alerta:</b> {{ .Annotations.summary }}</p>
          <p><b>Descripción:</b> {{ .Annotations.description }}</p>
          <p><b>Servicio:</b> {{ .Labels.service }}</p>
          <hr>
          {{ end }}

    inhibit_rules:
    - source_match:
        severity: 'critical'
      target_match:
        severity: 'warning'
      equal: ['service', 'instance']
      
    - source_match:
        alertname: 'CuenlyBackendDown'
      target_match_re:
        alertname: 'Cuenly.*'
      equal: ['service']
