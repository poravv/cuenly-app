# Configuración de AlertManager para Cuenly
# Archivo: config/alertmanager.yml

global:
  # SMTP configuration para emails
  smtp_smarthost: '${ALERTMANAGER_SMTP_HOST}:${ALERTMANAGER_SMTP_PORT}'
  smtp_from: '${ALERTMANAGER_SMTP_USER}'
  smtp_auth_username: '${ALERTMANAGER_SMTP_USER}'
  smtp_auth_password: '${ALERTMANAGER_SMTP_PASSWORD}'
  smtp_require_tls: true

# Plantillas de mensajes
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Configuración de enrutamiento
route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'cuenly-team'
  
  # Rutas específicas por severidad
  routes:
  - match:
      severity: critical
    receiver: 'critical-alerts'
    group_wait: 5s
    repeat_interval: 30m
    
  - match:
      severity: warning
    receiver: 'warning-alerts'
    repeat_interval: 2h
    
  - match:
      category: business
    receiver: 'business-alerts'
    repeat_interval: 4h

# Configuración de receptores (dónde enviar)
receivers:
- name: 'cuenly-team'
  email_configs:
  - to: 'andres.vera@mindtechpy.net, andyvercha@gmail.com'
    subject: '[Cuenly] Alerta: {{ .GroupLabels.alertname }}'
    html: |
      <h2>Alerta Cuenly</h2>
      {{ range .Alerts }}
      <p><b>Alerta:</b> {{ .Annotations.summary }}</p>
      <p><b>Descripcion:</b> {{ .Annotations.description }}</p>
      <p><b>Severidad:</b> {{ .Labels.severity }}</p>
      <p><b>Servicio:</b> {{ .Labels.service }}</p>
      <p><b>Tiempo:</b> {{ .StartsAt.Format "2006-01-02 15:04:05" }}</p>
      <hr>
      {{ end }}

- name: 'critical-alerts'
  # Email inmediato para alertas críticas
  email_configs:
  - to: 'andres.vera@mindtechpy.net, andyvercha@gmail.com'
    subject: '🚨 [CRÍTICO] {{ .GroupLabels.alertname }}'
    html: |
      <h2>ALERTA CRITICA EN CUENLY</h2>
      {{ range .Alerts }}
      <p><b>Problema:</b> {{ .Annotations.summary }}</p>
      <p><b>Detalles:</b> {{ .Annotations.description }}</p>
      <p><b>Servicio:</b> {{ .Labels.service }}</p>
      <p><b>Hora:</b> {{ .StartsAt.Format "2006-01-02 15:04:05" }}</p>
      <p><b>Runbook:</b> {{ .Annotations.runbook_url }}</p>
      <hr>
      {{ end }}
  
  # Slack para alertas críticas (opcional)
  slack_configs:
  - api_url: 'https://hooks.slack.com/services/TU-SLACK-WEBHOOK'
    channel: '#cuenly-alerts'
    title: '🚨 Alerta Crítica en Cuenly'
    text: |
      {{ range .Alerts }}
      *{{ .Annotations.summary }}*
      {{ .Annotations.description }}
      Severidad: {{ .Labels.severity }}
      {{ end }}

- name: 'warning-alerts'
  email_configs:
  - to: 'andres.vera@mindtechpy.net, andyvercha@gmail.com'
    subject: '⚠️ [WARNING] {{ .GroupLabels.alertname }}'
    html: |
      <h2>⚠️ Alerta Warning en Cuenly</h2>
      {{ range .Alerts }}
      <p><b>Alerta:</b> {{ .Annotations.summary }}</p>
      <p><b>Descripción:</b> {{ .Annotations.description }}</p>
      <p><b>Servicio:</b> {{ .Labels.service }}</p>
      <hr>
      {{ end }}

- name: 'business-alerts'
  email_configs:
  - to: 'andres.vera@mindtechpy.net, andyvercha@gmail.com'
    subject: '📊 [BUSINESS] {{ .GroupLabels.alertname }}'
    html: |
      <h2>📊 Alerta de Negocio en Cuenly</h2>
      {{ range .Alerts }}
      <p><b>Alerta:</b> {{ .Annotations.summary }}</p>
      <p><b>Descripción:</b> {{ .Annotations.description }}</p>
      <p><b>Servicio:</b> {{ .Labels.service }}</p>
      <hr>
      {{ end }}

# Inhibiciones (evitar spam de alertas relacionadas)
inhibit_rules:
- source_match:
    severity: 'critical'
  target_match:
    severity: 'warning'
  equal: ['service', 'instance']
  
- source_match:
    alertname: 'CuenlyBackendDown'
  target_match_re:
    alertname: 'Cuenly.*'
  equal: ['service']